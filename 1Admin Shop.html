<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYPHER VN | QUẢN TRỊ VIÊN</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00f2ff; --bg-body: #05060a; --bg-card: #0e111a;
            --text: #ffffff; --border: rgba(0, 242, 255, 0.3);
            --red: #ff4757; --green: #2ecc71; --orange: #f39c12;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; font-weight: 900 !important; }
        body { background-color: var(--bg-body); color: var(--text); padding: 20px; }
        
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--neon); padding-bottom: 15px; }
        
        .section-title { color: var(--neon); font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        /* Khu vực thông báo mới */
        .noti-container { background: rgba(243, 156, 18, 0.05); border: 1px solid var(--orange); border-radius: 15px; padding: 15px; margin-bottom: 30px; }
        .noti-item { 
            background: #000; border: 1px solid #333; padding: 15px; border-radius: 12px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Bảng quản lý */
        .admin-table-wrapper { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: rgba(0, 242, 255, 0.1); color: var(--neon); padding: 15px; text-align: left; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

        .btn-sm { padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 11px; color: #000; transition: 0.3s; }
        .btn-approve { background: var(--green); }
        .btn-delete { background: var(--red); }
        .btn-edit { background: var(--neon); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg-card); padding: 25px; border-radius: 20px; border: 2px solid var(--neon); width: 100%; max-width: 400px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: var(--neon); margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header-admin">
        <h1>ADMIN CYPHER</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn-sm btn-edit" onclick="location.reload()"><i class="fa-solid fa-rotate"></i> TẢI LẠI</button>
            <button class="btn-sm btn-delete" onclick="clearAllData()" style="color: white;">XÓA TOÀN BỘ DATA</button>
        </div>
    </div>

    <div class="section-title" style="color: var(--orange);"><i class="fa-solid fa-bell"></i> YÊU CẦU NẠP TIỀN CHỜ DUYỆT</div>
    <div class="noti-container" id="noti-list">
        <p style="text-align: center; color: #555; font-size: 13px;">Đang chờ thông báo mới từ khách hàng...</p>
    </div>

    <div class="section-title"><i class="fa-solid fa-users"></i> DANH SÁCH THÀNH VIÊN</div>
    <div class="admin-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>TÀI KHOẢN</th>
                    <th>MẬT KHẨU</th>
                    <th>SỐ DƯ</th>
                    <th>GIAO DỊCH</th>
                    <th>THAO TÁC</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>

    <div class="modal" id="modal-edit-money">
        <div class="modal-content">
            <h2 id="edit-user-title" style="color: var(--neon); margin-bottom: 15px; font-size: 18px;">CỘNG TIỀN</h2>
            <div class="input-group">
                <label>Nhập số tiền cần thay đổi (Dùng dấu - để trừ)</label>
                <input type="number" id="edit-amount" placeholder="Ví dụ: 100000">
            </div>
            <input type="hidden" id="edit-username">
            <button class="btn-sm btn-approve" style="width: 100%; padding: 15px;" onclick="confirmEditMoney()">XÁC NHẬN THAY ĐỔI</button>
            <button class="btn-sm" style="width: 100%; margin-top: 10px; background: none; color: #888;" onclick="closeModal()">HỦY BỎ</button>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('cypher_db')) || {};

        function renderAdmin() {
            const userTable = document.getElementById('user-list');
            userTable.innerHTML = '';
            
            for (let username in users) {
                const user = users[username];
                userTable.innerHTML += `
                    <tr>
                        <td>${username}</td>
                        <td style="color: #666; font-size: 11px;">${user.password}</td>
                        <td style="color: var(--neon);">${user.balance.toLocaleString()}đ</td>
                        <td><button class="btn-sm" style="background:#1a1d26; color:#fff" onclick="viewUserHistory('${username}')">XEM (${user.history.length})</button></td>
                        <td>
                            <button class="btn-sm btn-edit" onclick="openEditMoney('${username}')">SỬA TIỀN</button>
                            <button class="btn-sm btn-delete" style="color:#fff" onclick="deleteUser('${username}')">XÓA</button>
                        </td>
                    </tr>
                `;
            }

            renderNotifications();
        }

        function renderNotifications() {
            const notiList = document.getElementById('noti-list');
            const notis = JSON.parse(localStorage.getItem('admin_notifications')) || [];

            if (notis.length === 0) {
                notiList.innerHTML = '<p style="text-align: center; color: #555; font-size: 13px;">Không có yêu cầu nào mới.</p>';
                return;
            }

            notiList.innerHTML = notis.map((n, index) => `
                <div class="noti-item">
                    <div>
                        <div style="font-size: 14px;"><b style="color:var(--neon)">${n.user}</b> báo nạp <b style="color:var(--green)">${Number(n.amount).toLocaleString()}đ</b></div>
                        <div style="font-size: 10px; color: #777; margin-top: 5px;">${n.detail} | ${n.time}</div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-sm btn-approve" onclick="approveDeposit('${n.user}', ${n.amount}, ${index})">DUYỆT</button>
                        <button class="btn-sm btn-delete" style="color:#fff" onclick="removeNoti(${index})">XÓA</button>
                    </div>
                </div>
            `).join('');
        }

        function approveDeposit(username, amount, index) {
            if (users[username]) {
                users[username].balance += Number(amount);
                localStorage.setItem('cypher_db', JSON.stringify(users));
                removeNoti(index);
                alert("Đã duyệt " + Number(amount).toLocaleString() + "đ cho " + username);
                renderAdmin();
            }
        }

        function removeNoti(index) {
            let notis = JSON.parse(localStorage.getItem('admin_notifications')) || [];
            notis.splice(index, 1);
            localStorage.setItem('admin_notifications', JSON.stringify(notis));
            renderNotifications();
        }

        function openEditMoney(username) {
            document.getElementById('edit-username').value = username;
            document.getElementById('edit-user-title').innerText = "SỬA TIỀN: " + username;
            document.getElementById('modal-edit-money').style.display = 'flex';
        }

        function confirmEditMoney() {
            const username = document.getElementById('edit-username').value;
            const amount = parseInt(document.getElementById('edit-amount').value);
            if (isNaN(amount)) return alert("Vui lòng nhập số tiền!");
            
            users[username].balance += amount;
            localStorage.setItem('cypher_db', JSON.stringify(users));
            alert("Đã cập nhật số dư!");
            closeModal();
            renderAdmin();
        }

        function deleteUser(username) {
            if (confirm("Xóa tài khoản " + username + "?")) {
                delete users[username];
                localStorage.setItem('cypher_db', JSON.stringify(users));
                renderAdmin();
            }
        }

        function viewUserHistory(username) {
            const h = users[username].history;
            if (h.length === 0) return alert("Chưa có lịch sử mua hàng.");
            alert("Lịch sử của " + username + ":\n" + h.map(i => "- " + i.name + " (" + i.price + ") vào " + i.date).join("\n"));
        }

        function clearAllData() {
            if (confirm("CẢNH BÁO: Hành động này sẽ xóa sạch tài khoản và tiền của mọi người. Tiếp tục?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function closeModal() { document.getElementById('modal-edit-money').style.display = 'none'; }

        // Tự động cập nhật thông báo mỗi 5 giây
        setInterval(renderNotifications, 5000);
        window.onload = renderAdmin;
    </script>
</body>
</html>
